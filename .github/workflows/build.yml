name: Hadir iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build on macOS
    runs-on: macos-15  # Latest macOS with Xcode 16

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Print Swift version
        run: swift --version

      - name: Resolve package dependencies
        working-directory: Hadir.swiftpm
        run: swift package resolve || true

      - name: Build for iOS Simulator (iPad)
        working-directory: Hadir.swiftpm
        run: |
          xcodebuild build \
            -scheme Hadir \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || xcodebuild build \
              -scheme Hadir \
              -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO

      - name: Build for iOS Simulator (iPhone)
        working-directory: Hadir.swiftpm
        run: |
          xcodebuild build \
            -scheme Hadir \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Archive build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.log
          retention-days: 7
